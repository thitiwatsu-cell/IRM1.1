<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ฟอร์มสมัครงาน | IRM Extra</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ===== CSS ของคุณเหมือนเดิม (ผมไม่ตัด) ===== */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Kanit',sans-serif; }

body { background:#f8f9fa; }

/* ปุ่ม */
.btn-submit{
background:linear-gradient(135deg,#ff7a00,#e56a00);
color:#fff;
padding:16px;
border:none;
width:100%;
border-radius:30px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>ฟอร์มสมัครงาน</h2>

<!-- ===== FORM ===== -->
<div class="section">

<label>ชื่อ-นามสกุล</label>
<input type="text" id="full_name">

<label>วันเกิด</label>
<input type="date" id="birth_date">

<label>อายุ</label>
<input type="number" id="age">

<label>โทร</label>
<input type="tel" id="phone">

<label>Email</label>
<input type="email" id="email">

<label>ตำแหน่ง</label>
<select id="position">
<option>Developer</option>
<option>Admin</option>
<option>HR</option>
</select>

<label>Resume (PDF)</label>
<input type="file" id="resume">

<label>รูปถ่าย</label>
<input type="file" id="photo">

<br><br>

<button class="btn-submit" onclick="submitApplication()">
ส่งใบสมัคร
</button>

</div>
</div>

<!-- ===== SUPABASE ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://ligqxvqxionkdkikdcvn.supabase.co";
const supabaseKey = "YOUR_PUBLISHABLE_KEY";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function uploadFile(file, folder){
    const fileName = Date.now() + "-" + file.name;

    const { data, error } = await supabase.storage
        .from("files")
        .upload(folder + "/" + fileName, file);

    if(error){
        console.log(error);
        return null;
    }

    const { data: urlData } = supabase.storage
        .from("files")
        .getPublicUrl(folder + "/" + fileName);

    return urlData.publicUrl;
}

async function submitApplication(){

    const full_name = document.getElementById("full_name").value;
    const birth_date = document.getElementById("birth_date").value;
    const age = document.getElementById("age").value;
    const phone = document.getElementById("phone").value;
    const email = document.getElementById("email").value;
    const position = document.getElementById("position").value;

    const resumeFile = document.getElementById("resume").files[0];
    const photoFile = document.getElementById("photo").files[0];

    let resume_url = "";
    let photo_url = "";

    // upload resume
    if(resumeFile){
        resume_url = await uploadFile(resumeFile, "resume");
    }

    // upload photo
    if(photoFile){
        photo_url = await uploadFile(photoFile, "photo");
    }

    const { error } = await supabase
    .from("applicants")
    .insert([{
        name: full_name,
        birth_date: birth_date,
        age: age,
        phone: phone,
        email: email,
        position: position,
        resume_url: resume_url,
        photo_url: photo_url,
        status: "pending"
    }]);

    if(error){
        alert("เกิดข้อผิดพลาด: " + error.message);
        console.log(error);
    } else {
        alert("ส่งใบสมัครสำเร็จ");
        window.location.href = "success.html";
    }
}
</script>

</body>
</html>
